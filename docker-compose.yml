services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: fitness
      POSTGRES_USER: fitness
      POSTGRES_PASSWORD: fitness
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: always

  bot:
    build: .
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: always

volumes:
  pgdata:
